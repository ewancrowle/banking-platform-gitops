apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-svc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-detection-svc
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-detection-svc
    spec:
      containers:
        - name: fraud-detection-svc
          image: ghcr.io/ewancrowle/banking-platform-apps/fraud-detection-svc:latest
          ports:
            - containerPort: 8080
              name: server
