apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchant-svc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: merchant-svc
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: merchant-svc
    spec:
      containers:
        - name: merchant-svc
          image: ghcr.io/ewancrowle/banking-platform-apps/merchant-svc:latest
          ports:
            - containerPort: 8080
              name: server
          env:
            - name: IDENTITY_SERVICE_ADDR
              value: http://identity-svc:8080
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local:5432
            - name: DB_NAME
              value: banking_platform
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: postgres-password