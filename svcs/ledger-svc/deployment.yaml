apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-svc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ledger-svc
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ledger-svc
    spec:
      containers:
        - name: ledger-svc
          image: ghcr.io/ewancrowle/banking-platform-apps/ledger-svc:latest
          ports:
            - containerPort: 8080
              name: server
          env:
            - name: ACCOUNT_SERVICE_ADDR
              value: http://account-svc:8080
            - name: CLICKHOUSE_URL
              value: clickhouse://chi-clickhouse-clickhouse-0-0.clickhouse.svc.cluster.local:9000/?sslmode=disable
            - name: CHDEBUG
              value: 2