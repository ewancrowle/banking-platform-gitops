apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-svc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-svc
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-svc
    spec:
      containers:
        - name: payment-svc
          image: ghcr.io/ewancrowle/banking-platform-apps/payment-svc:latest
          ports:
            - containerPort: 8080
              name: server
          env:
            - name: IDENTITY_SERVICE_ADDR
              value: http://identity-svc:8080
            - name: ACCOUNT_SERVICE_ADDR
              value: http://account-svc:8080
            - name: MERCHANT_SERVICE_ADDR
              value: http://merchant-svc:8080
            - name: PAYMENT_DECISION_SERVICE_ADDR
              value: http://payment-decision-svc:8080
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local:5432
            - name: DB_NAME
              value: banking_platform
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: postgres-password
            - name: KAFKA_BROKERS
              value: redpanda.redpanda.svc.cluster.local:9093