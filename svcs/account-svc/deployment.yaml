apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-svc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: account-svc
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-svc
    spec:
      containers:
        - name: account-svc
          image: ghcr.io/ewancrowle/banking-platform-apps/account-svc:latest
          ports:
            - containerPort: 8080
              name: server
          env:
            - name: IDENTITY_SERVICE_ADDR
              value: identity-svc.platform.svc.cluster.local:8080
            - name: DB_HOST
              value: postgresql.postgresql.svc.cluster.local:5432
            - name: DB_NAME
              value: banking_platform
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: postgres-password