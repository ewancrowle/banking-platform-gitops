apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api-server
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-server
    spec:
      containers:
        - name: api-server
          image: ghcr.io/ewancrowle/banking-platform-apps/api-server:latest
          ports:
            - containerPort: 3000
              name: server
          env:
            - name: ACCOUNT_SERVICE_URL
              value: http://account-svc:8080
            - name: AUTH_SERVICE_URL
              value: http://oauth-svc:8080