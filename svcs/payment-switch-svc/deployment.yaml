apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-switch-svc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-switch-svc
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-switch-svc
    spec:
      containers:
        - name: payment-switch-svc
          image: ghcr.io/ewancrowle/banking-platform-apps/payment-switch-svc:latest
          ports:
            - containerPort: 8080
              name: server
          env:
            - name: PAYMENT_SERVICE_ADDR
              value: http://payment-svc:8080
